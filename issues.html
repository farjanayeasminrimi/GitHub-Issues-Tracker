<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <!-- Daisy UI and Tailwind CSS Link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Fav Icon -->
    <link rel="shortcut icon" href="./assets/Open-Status.png" type="image/x-icon" />

    <!-- Google front -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Font awesome link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      * {
        font-family: "Geist", sans-serif;
        font-optical-sizing: auto;
        font-style: normal;
      }
    </style>
  </head>

  <body class="bg-[#F8FAFC]">
    <header class="bg-base-100 shadow-sm py-1">
      <div
        class="w-11/12 mx-auto navbar flex justify-center md:justify-between flex-wrap md:flex-nowrap gap-4 md:gap-0 items-center"
      >
        <!-- Logo  -->
        <div class="flex items-center gap-1">
          <div class="w-[45px]">
            <img src="./assets/github-logo.png" alt="github-logo" />
          </div>
          <h1 class="text-[#000000] font-semibold text-2xl">GitHub Issues Tracker</h1>
        </div>
        <!-- Search bar -->
        <div class="flex justify-between gap-4">
          <label class="input">
            <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <g
                stroke-linejoin="round"
                stroke-linecap="round"
                stroke-width="2.5"
                fill="none"
                stroke="currentColor"
              >
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
              </g>
            </svg>
            <input type="search" required placeholder="Search issues..." />
          </label>
          <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
        </div>
      </div>
    </header>
    <main class="w-11/12 md:w-10/12 mx-auto my-10">
      <section class="">
        <!-- Tabs area -->
        <div
          class="mt-3 mb-5 bg-white py-4 px-4 rounded-lg drop-shadow-sm flex flex-wrap md:flex-nowrap justify-center md:justify-start gap-4"
        >
          <button class="btn w-[120px] btn-primary">All</button>
          <button class="btn w-[120px]">Open</button>
          <button class="btn w-[120px]">Closed</button>
        </div>
        <!-- Issues counting area -->
        <div
          class="navbar bg-base-100 shadow-sm flex gap-4 md:gap-0 flex-col md:flex-row justify-center md:justify-start py-3 md:py-0"
        >
          <!-- Icon -->
          <div class="flex-none mr-4">
            <img src="./assets/Aperture.png" alt="Aperture icon" />
          </div>
          <!-- Counting number -->
          <div class="flex-1 text-center md:text-left">
            <h1 class="text-[#1F2937] font-semibold text-xl">
              <span id="defaultCount">0</span> Issues
            </h1>
            <p class="text-[#64748B] text-[1rem]">Track and manage your project issues</p>
          </div>
          <!-- Color indication -->
          <div class="flex-none">
            <div class="flex gap-3 items-center">
              <span class="bg-green-700 w-3 h-3 rounded-full inline-block"></span>
              <p class="text-[#1F2937] font-medium text-[1rem]">Open</p>
              <span class="bg-purple-600 w-3 h-3 rounded-full inline-block"></span>
              <p class="text-[#1F2937] font-medium text-[1rem]">Closed</p>
            </div>
          </div>
        </div>
        <!-- Cards area -->
        <div
          class="mt-2 py-6 px-4 bg-base-100 shadow-sm grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4"
        >
          <div class="card bg-base-100 shadow-sm py-4 space-y-4">
            <!-- status & Priority -->
            <div class="flex justify-between px-4">
              <div>
                <img src="./assets/Open-Status.png" alt="Open-Status" />
              </div>
              <button class="button px-8 bg-red-300 rounded-3xl">HIGH</button>
            </div>
            <!-- intro info -->
            <div class="px-4 space-y-1">
              <h1 class="text-[#000000] font-semibold text-xl">
                Fix navigation menu on mobile devices
              </h1>
              <p class="text-[#64748B] text-[1rem]">
                The navigation menu doesn't collapse properly on mobile devices...
              </p>
            </div>
            <!-- levels -->
            <div class="px-4 flex justify-between">
              <button class="button px-2 bg-red-300 rounded-3xl">
                <i class="fa-solid fa-bug"></i> BUG
              </button>
              <button class="button px-3 bg-orange-200 rounded-3xl">
                <i class="fa-regular fa-life-ring"></i> HELP WANTED
              </button>
            </div>
            <hr class="text-gray-300 w-100% col-span-2" />
            <!-- author name -->
            <div class="px-4 space-y-2 flex flex-col">
              <span class="text-[#64748B] text-sm">#1 by john_doe</span>
              <span class="text-[#64748B] text-sm">1/15/2024</span>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script src="./JS/issues.js"></script>
  </body>
</html>
