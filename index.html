<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <!-- Daisy UI and Tailwind CSS Link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Fav Icon -->
    <link rel="shortcut icon" href="./assets/Open-Status.png" type="image/x-icon" />

    <!-- Google front -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Font awesome link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      * {
        font-family: "Geist", sans-serif;
        font-optical-sizing: auto;
        font-style: normal;
      }
    </style>
  </head>
  <body>
    <main class="w-10/12 mx-auto">
      <section class="flex flex-col items-center space-y-8 my-16">
        <div class="text-center">
          <div class="flex justify-center mb-6">
            <img src="./assets/github-logo.png" alt="github-logo" />
          </div>
          <h1 class="text-[#000000] font-semibold text-2xl mb-1">GitHub Issues Tracker</h1>
          <p class="text-[#64748B] text-[1rem]">Sign in to manage your issues</p>
        </div>
      </section>
    </main>
    <script src="./JS/script.js"></script>
  </body>
</html>
